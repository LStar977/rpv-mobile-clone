// ── Eyebrow / labels ──────────────────────────────────────────────────
function CDEyebrow({ children, color, style }) {
  return (
    <div style={{
      fontFamily: CD_MONO, fontSize: 9.5, fontWeight: 500,
      letterSpacing: '0.18em', textTransform: 'uppercase',
      color: color || CD_FG_FAINT, ...style,
    }}>{children}</div>
  );
}

// ── Status pill ────────────────────────────────────────────────────────
function CDStatus({ kind, label }) {
  const map = {
    live:      { color: CD_SUPPORT, dot: true,  text: label || 'Live' },
    scheduled: { color: CD_AMBER,   dot: false, text: label || 'Scheduled' },
    ended:     { color: CD_FG_FAINT,dot: false, text: label || 'Ended' },
    draft:     { color: CD_FG_FAINT,dot: false, text: label || 'Draft' },
    official:  { color: CD_GOLD,    dot: false, text: label || 'Official' },
  };
  const m = map[kind] || map.draft;
  return (
    <div style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      padding: '4px 9px', border: `1px solid ${m.color}55`,
      borderRadius: 999, fontFamily: CD_MONO, fontSize: 9.5,
      letterSpacing: '0.16em', textTransform: 'uppercase', color: m.color,
      background: kind === 'live' ? `${m.color}10` : 'transparent',
    }}>
      {m.dot && (
        <span style={{
          width: 6, height: 6, borderRadius: 99, background: m.color,
          boxShadow: `0 0 8px ${m.color}`,
          animation: kind === 'live' ? 'cdPulse 1.6s ease-in-out infinite' : 'none',
        }} />
      )}
      {m.text}
    </div>
  );
}

// ── Card surface ──────────────────────────────────────────────────────
function CDCard({ children, style, padding = 22, raised = false, glow = false, onClick, hoverable }) {
  const [hover, setHover] = React.useState(false);
  return (
    <div
      onClick={onClick}
      onMouseEnter={() => hoverable && setHover(true)}
      onMouseLeave={() => hoverable && setHover(false)}
      style={{
        background: raised ? CD_BG_2 : CD_SURFACE,
        border: `1px solid ${hover ? CD_LINE_2 : CD_LINE}`,
        borderRadius: 14,
        padding,
        boxShadow: glow
          ? `0 0 0 1px rgba(234,186,88,0.18), 0 18px 50px -18px rgba(234,186,88,0.25)`
          : 'none',
        cursor: onClick ? 'pointer' : 'default',
        transition: 'border-color 200ms ease, transform 200ms ease',
        ...style,
      }}
    >{children}</div>
  );
}

// ── Buttons ───────────────────────────────────────────────────────────
function CDButton({ children, kind = 'ghost', size = 'md', icon, iconRight, onClick, disabled, style }) {
  const [hover, setHover] = React.useState(false);
  const sizes = {
    sm: { h: 30, px: 12, fs: 12 },
    md: { h: 38, px: 16, fs: 13 },
    lg: { h: 46, px: 22, fs: 14 },
  };
  const s = sizes[size];
  const styles = {
    primary: {
      background: hover ? '#F2C672' : CD_GOLD,
      color: '#1A1409',
      border: '1px solid transparent',
      boxShadow: '0 1px 0 rgba(255,255,255,0.18) inset, 0 8px 22px -8px rgba(234,186,88,0.55)',
    },
    ghost: {
      background: hover ? 'rgba(255,255,255,0.06)' : CD_SURFACE,
      color: CD_FG,
      border: `1px solid ${hover ? CD_LINE_2 : CD_LINE}`,
    },
    outline: {
      background: 'transparent',
      color: CD_GOLD,
      border: `1px solid ${CD_GOLD_DIM}`,
    },
    bare: {
      background: 'transparent',
      color: hover ? CD_FG : CD_FG_MUTED,
      border: '1px solid transparent',
    },
    danger: {
      background: 'transparent',
      color: CD_OPPOSE,
      border: `1px solid ${CD_OPPOSE}55`,
    },
  };
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        height: s.h, padding: `0 ${s.px}px`,
        display: 'inline-flex', alignItems: 'center', gap: 8,
        fontFamily: CD_SANS, fontSize: s.fs, fontWeight: 500,
        letterSpacing: '-0.005em', borderRadius: 8,
        cursor: disabled ? 'not-allowed' : 'pointer',
        opacity: disabled ? 0.45 : 1,
        whiteSpace: 'nowrap',
        flexShrink: 0,
        transition: 'background 180ms ease, color 180ms ease, border-color 180ms ease',
        ...styles[kind], ...style,
      }}>
      {icon && <CDIcon name={icon} size={size === 'sm' ? 13 : 15} />}
      {children && <span style={{ whiteSpace: 'nowrap' }}>{children}</span>}
      {iconRight && <CDIcon name={iconRight} size={size === 'sm' ? 13 : 15} />}
    </button>
  );
}

function CDProposalRow({ p, onOpen }) {

  return (
    <div
      onClick={() => onOpen && onOpen(p, p.status === 'live' ? 'live' : 'analytics')}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        display: 'grid', gridTemplateColumns: '52px minmax(0, 1fr) 180px 110px 32px',

      {/* Ref badge */}
      <div style={{
        fontFamily: CD_MONO, fontSize: 9.5, color: CD_FG_FAINT,

      }}>
        {p.ref.split('·').map((s, i) => <div key={i}>{s.trim()}</div>)}
      </div>

      {/* Title block */}
      <div style={{ minWidth: 0 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
          <CDStatus kind={p.status} />
          {p.official && <span style={{
            fontFamily: CD_MONO, fontSize: 9, color: CD_GOLD, letterSpacing: '0.16em',
            border: `1px solid ${CD_GOLD_DIM}`, padding: '2px 7px', borderRadius: 4,
          }}>OFFICIAL</span>}
          <span style={{ fontFamily: CD_SANS, fontSize: 11, color: CD_FG_FAINT }}>· {p.cat}</span>
        </div>
        <div style={{
          fontFamily: CD_SERIF, fontSize: 16, color: CD_FG, fontWeight: 500,
          letterSpacing: '-0.01em', lineHeight: 1.25,
          overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
        }}>{p.title}</div>
        <div style={{ fontFamily: CD_SANS, fontSize: 11.5, color: CD_FG_FAINT, marginTop: 4, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
          {p.author} · {p.wards.join(', ')}
        </div>
      </div>

      {/* Sentiment bar */}
      {p.status !== 'scheduled' ? (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: CD_MONO, fontSize: 10, marginBottom: 4 }}>
            <span style={{ color: CD_SUPPORT }}>{supportPct.toFixed(0)}% sup</span>
            <span style={{ color: CD_OPPOSE }}>{(100 - supportPct).toFixed(0)}% opp</span>
          </div>
          <div style={{ display: 'flex', height: 4, borderRadius: 99, overflow: 'hidden', background: 'rgba(255,255,255,0.06)' }}>
            <div style={{ width: `${supportPct}%`, background: CD_SUPPORT }} />
            <div style={{ width: `${100 - supportPct}%`, background: CD_OPPOSE }} />
          </div>
          <div style={{ fontFamily: CD_SANS, fontSize: 10.5, color: CD_FG_FAINT, marginTop: 5 }}>
            {fmt(p.votes)} of {fmt(p.eligible)} eligible
          </div>
        </div>
      ) : (
        <div style={{ fontFamily: CD_SANS, fontSize: 12, color: CD_FG_FAINT }}>
          Opens soon · {fmt(p.eligible)} can vote
        </div>

      {/* Time / countdown */}
      <div>
        <div style={{ fontFamily: CD_MONO, fontSize: 9, color: CD_FG_FAINT, letterSpacing: '0.14em', marginBottom: 3 }}>
          {p.status === 'live' ? 'CLOSES IN' : p.status === 'scheduled' ? 'STATUS' : 'CLOSED'}

      <div style={{ textAlign: 'right' }}>
        <CDIcon name="arrow-right" size={16} color={hover ? CD_GOLD : CD_FG_FAINT} />
      </div>
    </div>
  );
}

// Civic Desk — Create Proposal (4-step wizard)

function CDCreateProposal({ onNav }) {
  const [step, setStep] = React.useState(2);
  const [scope, setScope] = React.useState('select');
  const [wards, setWards] = React.useState(['Ward 8', 'Ward 9']);
  const [official, setOfficial] = React.useState(true);

  const STEPS = [
    { n: 1, key: 'compose',  label: 'Write it',     sub: 'Title, body, attachments' },
    { n: 2, key: 'target',   label: 'Who votes',    sub: 'Pick the wards' },
    { n: 3, key: 'schedule', label: 'When',         sub: 'Voting window' },
    { n: 4, key: 'review',   label: 'Review',       sub: 'Send it out' },
  ];

  const toggleWard = (w) => setWards(prev =>
    prev.includes(w) ? prev.filter(x => x !== w) : [...prev, w]
  );

  return (
    <CDPage>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 20 }}>
        <div>
          <CDEyebrow style={{ marginBottom: 8 }}>Draft · CG·2062·26 · auto-saved 2s ago</CDEyebrow>
          <div style={{ fontFamily: CD_SERIF, fontSize: 32, color: CD_FG, fontWeight: 500, letterSpacing: '-0.018em' }}>
            New <span style={{ fontStyle: 'italic', color: CD_GOLD }}>proposal.</span>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <CDButton kind="bare" onClick={() => onNav('dashboard')}>Cancel</CDButton>
          <CDButton kind="ghost">Save draft</CDButton>
          <CDButton kind="primary" iconRight="arrow-right" onClick={() => step < 4 ? setStep(step + 1) : onNav('live')}>
            {step === 4 ? 'Publish proposal' : 'Continue'}
          </CDButton>
        </div>
      </div>

      {/* Stepper */}
      <CDCard padding={0} style={{ marginBottom: 24 }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)' }}>
          {STEPS.map((s, i) => {
            const done = step > s.n;
            const active = step === s.n;
            return (
              <button
                key={s.key}
                onClick={() => setStep(s.n)}
                style={{
                  padding: '18px 22px', textAlign: 'left',
                  background: active ? 'rgba(234,186,88,0.05)' : 'transparent',
                  border: 'none',
                  borderRight: i < 3 ? `1px solid ${CD_LINE}` : 'none',
                  borderBottom: active ? `2px solid ${CD_GOLD}` : '2px solid transparent',
                  cursor: 'pointer', color: 'inherit',
                  display: 'flex', gap: 12, alignItems: 'center',
                }}>
                <div style={{
                  width: 28, height: 28, borderRadius: 99, flexShrink: 0,
                  background: done ? CD_GOLD : 'transparent',
                  border: `1px solid ${active || done ? CD_GOLD : CD_LINE_2}`,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  color: done ? '#1A1409' : (active ? CD_GOLD : CD_FG_FAINT),
                  fontFamily: CD_MONO, fontSize: 12, fontWeight: 600,
                }}>
                  {done ? <CDIcon name="check" size={14} /> : s.n.toString().padStart(2, '0')}
                </div>
                <div>
                  <div style={{ fontFamily: CD_SANS, fontSize: 13, color: active || done ? CD_FG : CD_FG_MUTED, fontWeight: 500 }}>
                    {s.label}
                  </div>
                  <div style={{ fontFamily: CD_SANS, fontSize: 11, color: CD_FG_FAINT, marginTop: 2 }}>{s.sub}</div>
                </div>
              </button>
            );
          })}
        </div>
      </CDCard>

      {/* Step body */}
      {step === 1 && <CDStepCompose />}
      {step === 2 && <CDStepTarget scope={scope} setScope={setScope} wards={wards} toggleWard={toggleWard} />}
      {step === 3 && <CDStepSchedule wardCount={wards.length} />}
      {step === 4 && <CDStepReview wards={wards} official={official} setOfficial={setOfficial} />}
    </CDPage>
  );
}

function hexPoints(cx, cy, r) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI / 3) * i - Math.PI / 6;
    pts.push(`${cx + Math.cos(a) * r},${cy + Math.sin(a) * r}`);
  }
  return pts.join(' ');
}

function CDMini({ l, v, sub, gold, amber }) {

function CDMethodTile({ l, sub, pct, count }) {

    <div style={{ padding: 14, background: CD_BG_2, borderRadius: 8, border: `1px solid ${CD_LINE}` }}>

}

function CDLiveMap() {
  // Heatmap: ward shapes colored by support
  const wardData = [
    { id: 'W1', cx: 160, cy: 130, sup: 71 }, { id: 'W2', cx: 260, cy: 120, sup: 68 },
    { id: 'W3', cx: 360, cy: 135, sup: 74 }, { id: 'W4', cx: 450, cy: 165, sup: 52 },

    { id: 'W7', cx: 320, cy: 220, sup: 81 }, { id: 'W8', cx: 250, cy: 280, sup: 73 },
    { id: 'W9', cx: 340, cy: 295, sup: 69 }, { id: 'W10', cx: 425, cy: 260, sup: 47 },
    { id: 'W11', cx: 180, cy: 320, sup: 58 }, { id: 'W12', cx: 410, cy: 350, sup: 41 },
  ];
  const colorFor = (sup) => {
    if (sup >= 70) return CD_SUPPORT;
    if (sup >= 55) return CD_GOLD;
    return CD_OPPOSE;

    <svg viewBox="0 0 560 400" style={{ width: '100%', height: '100%', display: 'block' }}>

      <path d="M 30 170 Q 140 190 220 240 T 380 270 T 530 310"
        stroke="rgba(94,148,176,0.35)" strokeWidth="2" fill="none" />
      {wardData.map(w => {
        const c = colorFor(w.sup);
        const r = 46;
        return (
          <g key={w.id}>
            <circle cx={w.cx} cy={w.cy} r={r * 1.4} fill={`${c}22`} />

      })}
    </svg>
  );
}

// Time-series cumulative chart
function CDTimeChart({ proposal }) {
  // Simulate 14 days of cumulative arrival
  const days = 14;
  const supportFinal = proposal.support;
  const opposeFinal = proposal.oppose;
  // Bell-shaped daily arrival, weighted toward middle
  const dailyShare = (i) => {
    const x = (i + 0.5) / days;
    return Math.exp(-Math.pow((x - 0.5) * 3, 2));
  };
  const totalShare = Array.from({ length: days }, (_, i) => dailyShare(i)).reduce((a, b) => a + b, 0);
  let cumS = 0, cumO = 0;
  const rows = [];
  for (let i = 0; i < days; i++) {
    const share = dailyShare(i) / totalShare;
    cumS += supportFinal * share;
    cumO += opposeFinal * share;
    rows.push({ day: i, s: cumS, o: cumO });
  }
  const max = Math.max(supportFinal, opposeFinal) * 1.05;
  const W = 1000, H = 240, pad = { l: 50, r: 16, t: 14, b: 28 };
  const xFor = (i) => pad.l + (i / (days - 1)) * (W - pad.l - pad.r);
  const yFor = (v) => H - pad.b - (v / max) * (H - pad.t - pad.b);

  const supportPath = rows.map((r, i) => `${i === 0 ? 'M' : 'L'} ${xFor(i)} ${yFor(r.s)}`).join(' ');
  const opposePath = rows.map((r, i) => `${i === 0 ? 'M' : 'L'} ${xFor(i)} ${yFor(r.o)}`).join(' ');
  const supportArea = `${supportPath} L ${xFor(days - 1)} ${H - pad.b} L ${xFor(0)} ${H - pad.b} Z`;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ width: '100%', height: '100%' }}>
      <defs>
        <linearGradient id="cdSupGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={CD_SUPPORT} stopOpacity="0.25" />
          <stop offset="100%" stopColor={CD_SUPPORT} stopOpacity="0" />
        </linearGradient>
      </defs>
      {/* Y gridlines */}
      {[0, 0.25, 0.5, 0.75, 1].map(t => (
        <g key={t}>
          <line x1={pad.l} y1={pad.t + t * (H - pad.t - pad.b)} x2={W - pad.r} y2={pad.t + t * (H - pad.t - pad.b)} stroke={CD_LINE} strokeWidth="1" />
          <text x={pad.l - 8} y={pad.t + t * (H - pad.t - pad.b) + 4} fontFamily={CD_MONO} fontSize="10" fill={CD_FG_FAINT} textAnchor="end">
            {fmt(Math.round(max * (1 - t)))}
          </text>
        </g>
      ))}
      {/* X labels */}
      {[0, 3, 6, 9, 13].map(d => (
        <text key={d} x={xFor(d)} y={H - 8} fontFamily={CD_MONO} fontSize="10" fill={CD_FG_FAINT} textAnchor="middle">
          {`Day ${d + 1}`}
        </text>
      ))}
      <path d={supportArea} fill="url(#cdSupGrad)" />
      <path d={supportPath} stroke={CD_SUPPORT} strokeWidth="2" fill="none" />
      <path d={opposePath} stroke={CD_OPPOSE} strokeWidth="2" fill="none" strokeDasharray="0" />

      {/* Milestone markers */}
      <g>
        <line x1={xFor(6)} y1={pad.t} x2={xFor(6)} y2={H - pad.b} stroke={CD_GOLD_DIM} strokeWidth="1" strokeDasharray="3 3" />
        <circle cx={xFor(6)} cy={yFor(rows[6].s)} r="4" fill={CD_GOLD} />
        <text x={xFor(6) + 8} y={yFor(rows[6].s) - 8} fontFamily={CD_MONO} fontSize="10" fill={CD_GOLD} letterSpacing="0.08em">
          50K MARK
        </text>
      </g>
    </svg>
  );
}

// Donut chart helper
function CDDonut({ segments }) {
  const total = segments.reduce((s, x) => s + x.v, 0);
  const r = 70, stroke = 18, cx = 90, cy = 90;
  const C = 2 * Math.PI * r;
  let acc = 0;
  return (
    <svg viewBox="0 0 180 180" style={{ width: '100%', height: '100%' }}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth={stroke} />
      {segments.map((seg, i) => {
        const len = (seg.v / total) * C;
        const dash = `${len} ${C - len}`;
        const off = -acc;
        acc += len;
        return (
          <circle
            key={i} cx={cx} cy={cy} r={r} fill="none"
            stroke={seg.c} strokeWidth={stroke}
            strokeDasharray={dash} strokeDashoffset={off}
            transform={`rotate(-90 ${cx} ${cy})`}
            strokeLinecap="butt"
          />
        );
      })}
    </svg>
  );
}

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

function App() {
  const [screen, setScreen] = useState('dashboard');
  const [openProposal, setOpenProposal] = useState(null);
  const [tick, setTick] = useState(0);

  // Wait for logo to load (max ~600ms), then re-render once
  useEffect(() => {
    let n = 0;
    const id = setInterval(() => {
      n++;
      if (window.__LOGO_READY || n > 6) {
        setTick(t => t + 1);
        clearInterval(id);
      }
    }, 100);
    return () => clearInterval(id);
  }, []);

  const onNav = (target) => {
    setScreen(target);
    if (target === 'dashboard' || target === 'reports' || target === 'settings' || target === 'create') {
      setOpenProposal(null);
    }
  };

  const onOpen = (proposal, view) => {
    setOpenProposal(proposal);
    setScreen(view || 'live');
  };

  // Active sidebar key
  const sidebarActive =
    screen === 'dashboard' ? 'dashboard' :
    screen === 'create'    ? 'create' :
    screen === 'live'      ? 'live' :
    screen === 'analytics' ? 'analytics' :
    screen === 'reports'   ? 'reports' :
    screen === 'settings'  ? 'settings' : 'dashboard';

  // Topbar crumbs per screen
  const crumbsMap = {
    dashboard: [{ label: 'Calgary', kind: 'org' }, { label: 'Dashboard' }],
    create:    [{ label: 'Calgary', kind: 'org' }, { label: 'Proposals' }, { label: 'New', current: true }],
    live:      [{ label: 'Calgary', kind: 'org' }, { label: 'Proposals' }, { label: openProposal?.ref || 'Live', current: true }],
    analytics: [{ label: 'Calgary', kind: 'org' }, { label: 'Proposals' }, { label: openProposal?.ref || 'Analytics', current: true }],
    reports:   [{ label: 'Calgary', kind: 'org' }, { label: 'Reports & archives' }],
    settings:  [{ label: 'Calgary', kind: 'org' }, { label: 'Settings' }],
  };

  // Topbar actions per screen
  const actionsMap = {
    dashboard: (
      <>
        <CDButton size="sm" kind="ghost" icon="bell" />
        <CDButton size="sm" kind="primary" icon="plus" onClick={() => onNav('create')}>New proposal</CDButton>
      </>
    ),
    create: (
      <>
        <CDButton size="sm" kind="ghost">Save draft</CDButton>
        <CDButton size="sm" kind="bare" iconRight="x" onClick={() => onNav('dashboard')}>Cancel</CDButton>
      </>
    ),
    live: (
      <>
        <CDButton size="sm" kind="ghost" icon="share">Share</CDButton>
        <CDButton size="sm" kind="ghost" icon="csv">Export</CDButton>
        <CDButton size="sm" kind="primary" icon="pdf">Snapshot PDF</CDButton>
      </>
    ),
    analytics: (
      <>
        <CDButton size="sm" kind="ghost" iconRight="arrow-right" onClick={() => onNav('reports')}>Reports</CDButton>
      </>
    ),
    reports: null,
    settings: null,
  };

  let body;
  if (screen === 'dashboard')      body = <CDDashboard onNav={onNav} onOpen={onOpen} />;
  else if (screen === 'create')    body = <CDCreateProposal onNav={onNav} />;
  else if (screen === 'live')      body = <CDLiveResults proposal={openProposal} onNav={onNav} />;
  else if (screen === 'analytics') body = <CDAnalytics proposal={openProposal} onNav={onNav} />;
  else if (screen === 'reports')   body = <CDReports onNav={onNav} />;
  else if (screen === 'settings')  body = <CDSettings onNav={onNav} />;

  return (
    <>
      <CDStyles />
      <div style={{
        display: 'flex',
        minHeight: '100vh',
        background: CD_BG,
      }}>
        <CDSidebar active={sidebarActive} onNav={onNav} />
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
          <CDTopbar
            crumbs={crumbsMap[screen]}
            actions={actionsMap[screen]}
            search={screen !== 'create'}
          />
          {body}
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
